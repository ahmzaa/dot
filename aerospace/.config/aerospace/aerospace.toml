config-version = 2

# Start AeroSpace at login
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = false

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

[workspace-to-monitor-force-assignment]
1 = 1
2 = 1
3 = 1
4 = 1
5 = 1
6 = 1
7 = 1
8 = 1

Zoom = '1'
Term = '1'
chrome = '1'
Obsidian = '1'
Slack = '2'
Huddle = '2'
Music = "2"

[key-mapping]
    preset = 'qwerty'

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-a = 'workspace Huddle'
    alt-c = 'workspace Chrome'
    alt-f = 'workspace Firefox'
    alt-s = 'workspace Slack'
    alt-t = 'workspace Terminal'
    alt-m = 'workspace Music'
    alt-o = 'workspace Obsidian'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace Huddle'
    alt-shift-c = 'move-node-to-workspace Chrome'
    alt-shift-f = 'move-node-to-workspace Firefox'
    alt-shift-s = 'move-node-to-workspace Slack'
    alt-shift-t = 'move-node-to-workspace Terminal'
    alt-shift-m = 'move-node-to-workspace Music'
    alt-shift-o = 'move-node-to-workspace Obsidian'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace Slack'

#[[on-window-detected]]
#if.app-id = 'com.tinyspeck.slackmacgap'
#if.window-title-regex-substring = "*Huddle*"
#run = 'move-node-to-workspace Huddle'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace Chrome'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'move-node-to-workspace Zoom'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace Firefox'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace Obsidian'

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'move-node-to-workspace Music'
